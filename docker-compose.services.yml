# Lightweight compose file for local development.
# Starts ONLY infrastructure services (no api/worker/frontend/monitoring).
#
# Usage:
#   docker compose -f docker-compose.services.yml up -d

version: "3.9"

services:
  postgres:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.db
    environment:
      POSTGRES_USER: kalye
      POSTGRES_PASSWORD: kalye_dev
      POSTGRES_DB: kalye
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/docker/init-extensions.sql:/docker-entrypoint-initdb.d/10-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalye"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
