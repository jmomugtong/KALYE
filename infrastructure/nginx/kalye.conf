# KALYE — nginx reverse proxy with DDoS/bot protection
# Copy to /etc/nginx/sites-available/kalye and symlink to sites-enabled

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Block known bad bots
map $http_user_agent $bad_bot {
    default         0;
    ~*masscan       1;
    ~*nikto         1;
    ~*sqlmap        1;
    ~*nmap          1;
    ~*zgrab         1;
    ~*python-httpx  1;
    ~*go-http-client 1;
}

server {
    listen 80;
    server_name kalye.ph www.kalye.ph;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kalye.ph www.kalye.ph;

    # TLS (replace with your cert paths)
    ssl_certificate     /etc/letsencrypt/live/kalye.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kalye.ph/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS (preload after confirming everything works)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # DDoS — connection limit
    limit_conn conn_limit 20;

    # Block bad bots
    if ($bad_bot) { return 444; }

    # Block empty User-Agent
    if ($http_user_agent = "") { return 444; }

    # Max request body (10MB for image uploads)
    client_max_body_size 10M;

    # Timeouts
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # Frontend (Next.js)
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API — general
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass       http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — uploads (stricter limit)
    location /api/v1/images/upload {
        limit_req zone=upload_limit burst=3 nodelay;
        client_max_body_size 10M;
        proxy_pass       http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # Allow time for AI inference
    }

    # API — auth (strictest limit)
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=2 nodelay;
        proxy_pass       http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block common attack paths
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 404; }
    location ~* /\. { return 404; }
    location = /xmlrpc.php { return 444; }
    location = /wp-login.php { return 444; }
}
