name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          cd backend
          pip install poetry
          poetry install --no-root
      - name: Black
        run: cd backend && poetry run black --check src/ tests/
      - name: Isort
        run: cd backend && poetry run isort --check-only src/ tests/
      - name: Flake8
        run: cd backend && poetry run flake8 src/ tests/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kalye_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install deps
        run: cd backend && pip install poetry && poetry install --no-root
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kalye_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          APP_ENV: test
        run: cd backend && poetry run pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: cd frontend && npm ci
      - name: Run tests
        run: cd frontend && npm test -- --coverage --watchAll=false
      - name: Build
        run: cd frontend && npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Safety check
        run: pip install safety && cd backend && safety check --file=requirements.txt || true
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f infrastructure/docker/Dockerfile.api -t kalye-api:${{ github.sha }} ./backend
      - name: Build Worker image
        run: docker build -f infrastructure/docker/Dockerfile.worker -t kalye-worker:${{ github.sha }} ./backend
      - name: Build Frontend image
        run: docker build -f infrastructure/docker/Dockerfile.frontend -t kalye-frontend:${{ github.sha }} ./frontend
