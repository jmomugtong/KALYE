name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: kalye
          POSTGRES_PASSWORD: kalye_dev
          POSTGRES_DB: kalye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry==1.8.4
      - name: Install dependencies
        working-directory: backend
        run: poetry install
      - name: Lint
        working-directory: backend
        run: poetry run ruff check src/ tests/
      - name: Type check
        working-directory: backend
        run: poetry run mypy src/
      - name: Test
        working-directory: backend
        run: poetry run pytest tests/ -v --cov=src --cov-report=term
        env:
          DATABASE_URL: postgresql+asyncpg://kalye:kalye_dev@localhost:5432/kalye_test
          REDIS_URL: redis://localhost:6379/0

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check
        working-directory: frontend
        run: npm run type-check
      - name: Test
        working-directory: frontend
        run: npm run test
