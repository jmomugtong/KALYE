name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker build -f infrastructure/docker/Dockerfile.api -t kalye-api:${{ github.sha }} ./backend
          docker build -f infrastructure/docker/Dockerfile.worker -t kalye-worker:${{ github.sha }} ./backend
          docker build -f infrastructure/docker/Dockerfile.frontend -t kalye-frontend:${{ github.sha }} ./frontend

      - name: Deploy to staging
        run: |
          echo "Deploying images to staging environment..."
          echo "  kalye-api:${{ github.sha }}"
          echo "  kalye-worker:${{ github.sha }}"
          echo "  kalye-frontend:${{ github.sha }}"
          # TODO: Replace with actual deployment commands (e.g., kubectl apply, docker compose up, etc.)

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Wait for staging to be ready
        run: sleep 15

      - name: Health check - API
        run: |
          STAGING_URL="${{ vars.STAGING_API_URL || 'http://staging.kalye.local' }}"
          echo "Checking API health at ${STAGING_URL}/health ..."
          curl --fail --retry 5 --retry-delay 5 --retry-max-time 60 \
            "${STAGING_URL}/health" || {
              echo "API health check failed"
              exit 1
            }

      - name: Health check - Frontend
        run: |
          STAGING_URL="${{ vars.STAGING_FRONTEND_URL || 'http://staging.kalye.local:3000' }}"
          echo "Checking frontend at ${STAGING_URL} ..."
          curl --fail --retry 5 --retry-delay 5 --retry-max-time 60 \
            "${STAGING_URL}" || {
              echo "Frontend health check failed"
              exit 1
            }

      - name: Smoke test - API endpoints
        run: |
          STAGING_URL="${{ vars.STAGING_API_URL || 'http://staging.kalye.local' }}"
          echo "Testing GraphQL endpoint..."
          curl --fail -X POST "${STAGING_URL}/graphql" \
            -H "Content-Type: application/json" \
            -d '{"query": "{ __typename }"}' || {
              echo "GraphQL smoke test failed"
              exit 1
            }

  deploy-production:
    runs-on: ubuntu-latest
    needs: smoke-tests
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production images
        run: |
          docker build -f infrastructure/docker/Dockerfile.api -t kalye-api:${{ github.sha }} ./backend
          docker build -f infrastructure/docker/Dockerfile.worker -t kalye-worker:${{ github.sha }} ./backend
          docker build -f infrastructure/docker/Dockerfile.frontend -t kalye-frontend:${{ github.sha }} ./frontend

      - name: Deploy to production
        run: |
          echo "Deploying images to production environment..."
          echo "  kalye-api:${{ github.sha }}"
          echo "  kalye-worker:${{ github.sha }}"
          echo "  kalye-frontend:${{ github.sha }}"
          # TODO: Replace with actual production deployment commands

      - name: Post-deploy health check
        run: |
          PROD_URL="${{ vars.PRODUCTION_API_URL || 'http://kalye.local' }}"
          echo "Verifying production health at ${PROD_URL}/health ..."
          curl --fail --retry 5 --retry-delay 10 --retry-max-time 120 \
            "${PROD_URL}/health" || {
              echo "Production health check failed"
              exit 1
            }
